<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo Vórtice | Arquitectura de Flujo</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; background-color: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        /* Secciones compactas para evitar scroll excesivo */
        section { min-height: 45vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 10px; margin: 0; }
        img { max-width: 90%; max-height: 40vh; object-fit: contain; }
        .frase { margin-top: 10px; font-weight: 200; letter-spacing: 2px; text-transform: uppercase; font-size: 0.75rem; color: #777; max-width: 85%; }
        /* Contenedor para los dos logos con más separación y elevación */
        .logos-container { display: flex; gap: 40px; justify-content: center; align-items: center; margin-bottom: 30px; margin-top: -30px; } /* Ajuste de gap y márgenes */
        .logo-img { width: 100px; height: auto; border: none; background: transparent; } /* Ligeramente más pequeños para balancear */
        footer { width: 100%; text-align: center; font-size: 0.55rem; color: #333; padding: 30px 0; border-top: 1px solid #111; }
    </style>
</head>
<body>
    <section>
        <img src="Bandada.jpg">
        <div class="frase">Sincronía sistémica sin fricción.</div>
    </section>
    <section>
        <img src="Nodo.jpg">
        <div class="frase">La unidad esencial del flujo.</div>
    </section>
    <section>
        <div class="logos-container">
            <img src="Logo1.png" class="logo-img">
            <img src="Logo2.png" class="logo-img">
        </div>
        <div class="frase">Vórtice: La armonía del flujo, la precisión del nodo.</div>
    </section>
    <footer>PROPIEDAD INTELECTUAL REGISTRADA DNDA - PROTOCOLO AGNOSTICO Y CUANTICO</footer>
</body>
</html>
